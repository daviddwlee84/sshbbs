services:
  hostkey-init:
    image: alpine:3.20
    volumes:
      - bbs-keys:/keys
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ ! -f /keys/host_ed25519 ]; then
          apk add --no-cache openssh-keygen >/dev/null
          ssh-keygen -t ed25519 -f /keys/host_ed25519 -N "" -q
          chmod 600 /keys/host_ed25519
        fi
  sshbbs:
    build:
      context: .
      args:
        VERSION: dev
    depends_on:
      hostkey-init:
        condition: service_completed_successfully
    ports:
      - "2222:2222"
    volumes:
      - bbs-data:/data
      - bbs-keys:/keys
    restart: unless-stopped

volumes:
  bbs-data:
  bbs-keys:
