services:
  hostkey-init:
    image: alpine:3.20
    volumes:
      - bbs-keys:/keys
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ ! -f /keys/host_ed25519 ]; then
          apk add --no-cache openssh-keygen >/dev/null
          ssh-keygen -t ed25519 -f /keys/host_ed25519 -N "" -q
          chmod 600 /keys/host_ed25519
        fi
  apprise:
    # Optional: bundled apprise-api for demo / single-user / homelab use.
    # NOT started by default — the BBS notify dispatcher just POSTs JSON to
    # whatever URL each user configures (Discord webhook, ntfy.sh, their
    # own apprise instance, anything HTTP). This bundled service exists
    # for convenience when you want apprise:// URL fan-out without
    # setting up a separate host.
    #
    # The admin REST API on :8000 has no authentication, so do NOT expose
    # this profile on a multi-tenant BBS — any user with network access
    # to :8000 can read/edit/delete every other user's keys. See
    # docs/notifications.md ("BBS operator's view") for the threat model.
    #
    # Bring it up explicitly when wanted:
    #   docker compose --profile demo up -d
    image: caronc/apprise:latest
    profiles: ["demo"]
    ports:
      - "8000:8000"
    volumes:
      - apprise-config:/config
    restart: unless-stopped
  sshbbs:
    build:
      context: .
      args:
        VERSION: dev
    depends_on:
      hostkey-init:
        condition: service_completed_successfully
    ports:
      - "2222:2222"
    volumes:
      - bbs-data:/data
      - bbs-keys:/keys
    restart: unless-stopped

volumes:
  bbs-data:
  bbs-keys:
  apprise-config:
