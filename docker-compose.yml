services:
  hostkey-init:
    image: alpine:3.20
    volumes:
      - bbs-keys:/keys
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ ! -f /keys/host_ed25519 ]; then
          apk add --no-cache openssh-keygen >/dev/null
          ssh-keygen -t ed25519 -f /keys/host_ed25519 -N "" -q
          chmod 600 /keys/host_ed25519
        fi
  apprise:
    # Webhook fan-out for per-user notifications (push / wb / mail / Re:).
    # BBS reaches it via the docker DNS name "apprise" inside the compose
    # network; from the host it's http://localhost:8000. See
    # docs/notifications.md for the per-user setup walkthrough.
    image: caronc/apprise:latest
    ports:
      - "8000:8000"
    volumes:
      - apprise-config:/config
    restart: unless-stopped
  sshbbs:
    build:
      context: .
      args:
        VERSION: dev
    depends_on:
      hostkey-init:
        condition: service_completed_successfully
      apprise:
        condition: service_started
    ports:
      - "2222:2222"
    volumes:
      - bbs-data:/data
      - bbs-keys:/keys
    restart: unless-stopped

volumes:
  bbs-data:
  bbs-keys:
  apprise-config:
